<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📚 Глубже</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f5f0e8;
      --card:    #fffdf8;
      --accent:  #2e7d32;
      --accent2: #4caf50;
      --text:    #2c2c2c;
      --muted:   #7a7a6e;
      --border:  #e0d8cc;
      --shadow:  0 2px 12px rgba(0,0,0,0.07);
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 40px;
    }

    /* ── Header ── */
    .header {
      background: var(--accent);
      color: #fff;
      padding: 16px 16px 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 600;
    }
    .header p {
      font-size: 0.78rem;
      opacity: 0.85;
      margin-top: 2px;
    }

    /* ── Loading / Error ── */
    .state-box {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }
    .state-box .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .state-box p { font-size: 0.95rem; line-height: 1.5; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Content ── */
    .content {
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
    }
    .card-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
    }

    /* ── Topics ── */
    .topics {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 14px 12px;
    }
    .topic-chip {
      background: #e8f5e9;
      color: var(--accent);
      font-size: 0.73rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
    }

    /* ── Related posts ── */
    .related-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .related-item:last-child { border-bottom: none; }
    .related-item:active { background: #f0ebe0; }
    .related-num {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 0.8rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .related-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--accent);
    }
    .related-sub {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Bible item — ВЕРТИКАЛЬНЫЙ layout ── */
    .bible-item {
      padding: 14px 14px 12px;
      border-bottom: 1px solid var(--border);
    }
    .bible-item:last-child { border-bottom: none; }

    .bible-role {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 4px;
    }
    .bible-ref {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--accent);
      line-height: 1.2;
    }
    .bible-theme {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 3px;
      line-height: 1.4;
    }
    .bible-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      line-height: 1.65;
      color: var(--text);
      margin-top: 10px;
      font-style: italic;
      padding: 10px 12px;
      background: #f7f3ea;
      border-left: 3px solid var(--accent2);
      border-radius: 0 6px 6px 0;
    }
    .trans-links {
      margin-top: 10px;
    }
    .trans-btn {
      font-size: 0.78rem;
      font-weight: 700;
      padding: 6px 16px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      transition: background 0.15s;
    }
    .trans-btn:active { background: #1b5e20; }

    /* ── Reflection ── */
    .reflection-body {
      padding: 14px 14px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      line-height: 1.65;
      font-style: italic;
      color: var(--text);
    }
    .reflection-body::before { content: '«'; color: var(--accent); }
    .reflection-body::after  { content: '»'; color: var(--accent); }
  </style>
</head>
<body>

<div class="header">
  <h1>📚 Глубже</h1>
  <p id="header-sub">Загрузка материалов...</p>
</div>

<div id="app">
  <div class="state-box">
    <div class="spinner"></div>
    <p>Загружаем материалы...</p>
  </div>
</div>

<script>
  const BACKEND = "https://test-4r3t.onrender.com";

  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  function getPostId() {
    const startParam = tg?.initDataUnsafe?.start_param;
    if (startParam) return startParam;
    const params = new URLSearchParams(window.location.search);
    return params.get("post_id") || params.get("start");
  }

  function openLink(url) {
    if (tg?.openLink) tg.openLink(url);
    else window.open(url, "_blank");
  }

  async function load() {
    const postId = getPostId();
    const app = document.getElementById("app");
    const sub = document.getElementById("header-sub");

    if (!postId) {
      app.innerHTML = `<div class="state-box"><div class="icon">🔍</div><p>Открой эту страницу через кнопку в посте канала.</p></div>`;
      sub.textContent = "Пост не указан";
      return;
    }

    sub.textContent = `Пост #${postId}`;

    try {
      const r = await fetch(`${BACKEND}/links/${postId}`);
      if (!r.ok) throw new Error(r.status === 404 ? "not_found" : "error");
      render(await r.json(), postId);
    } catch (e) {
      if (e.message === "not_found") {
        app.innerHTML = `<div class="state-box"><div class="icon">⏳</div><p>Материалы ещё готовятся.<br>Зайди через минуту.</p></div>`;
      } else {
        app.innerHTML = `<div class="state-box"><div class="icon">⚠️</div><p>Не удалось загрузить данные.<br>Проверь соединение.</p></div>`;
      }
      sub.textContent = "Ошибка";
    }
  }

  function render(data, postId) {
    const sub = document.getElementById("header-sub");
    sub.textContent = `Пост #${postId}`;

    let html = '<div class="content">';

    // Темы
    if (data.topics?.length) {
      html += `<div class="card">
        <div class="card-header"><span>🏷️</span><h2>Темы</h2></div>
        <div class="topics">${data.topics.map(t => `<span class="topic-chip">${t}</span>`).join("")}</div>
      </div>`;
    }

    // Связанные посты
    if (data.related_posts?.length) {
      const items = data.related_posts.map((id, i) => `
        <div class="related-item" onclick="openLink('https://t.me/Testovuj/${id}')">
          <div class="related-num">${i + 1}</div>
          <div>
            <div class="related-title">Пост #${id}</div>
            <div class="related-sub">Похожая тема в канале</div>
          </div>
        </div>`).join("");
      html += `<div class="card">
        <div class="card-header"><span>🔗</span><h2>Связанные посты</h2></div>
        ${items}
      </div>`;
    }

    // Библейские отрывки
    if (data.bible_refs?.length) {
      const roleLabels = {
        "автора": "✍️ Текст автора",
        "дополнительно": "📖 Дополнительно",
      };
      const items = data.bible_refs.map(b => {
        const roleLabel = b.role ? (roleLabels[b.role] || "") : "";
        const translations = b.translations || {};
        const btns = Object.entries(translations).map(([name, url]) =>
          `<button class="trans-btn" onclick="openLink('${url}')">${name}</button>`
        ).join("");
        return `
        <div class="bible-item">
          ${roleLabel ? `<div class="bible-role">${roleLabel}</div>` : ""}
          <div class="bible-ref">${b.ref}</div>
          <div class="bible-theme">${b.theme}</div>
          ${b.text_syn ? `<div class="bible-text">${b.text_syn}</div>` : ""}
          <div class="trans-links">${btns}</div>
        </div>`;
      }).join("");
      html += `<div class="card">
        <div class="card-header"><span>📖</span><h2>Библейские отрывки</h2></div>
        ${items}
      </div>`;
    }

    // Вопрос для размышления
    if (data.reflection) {
      html += `<div class="card">
        <div class="card-header"><span>🙏</span><h2>Вопрос для размышления</h2></div>
        <div class="reflection-body">${data.reflection}</div>
      </div>`;
    }

    html += '</div>';
    document.getElementById("app").innerHTML = html;
  }

  load();
</script>
</body>
</html>
